<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Sistem Absensi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-fingerprint"></i>
                    <h2>Absensi System</h2>
                </div>
                <p class="auth-subtitle">Buat akun baru</p>
            </div>

            <div id="alertMessage" class="alert" style="display: none;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">
                        <i class="fas fa-user"></i>
                        Nama Lengkap
                    </label>
                    <input type="text" id="name" name="name" required placeholder="Nama lengkap">
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="email" name="email" required placeholder="contoh@email.com">
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required placeholder="Minimal 6 karakter">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-check-circle"></i>
                        Konfirmasi Password
                    </label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Ulangi password">
                </div>

                <div class="form-group">
                    <label for="role">
                        <i class="fas fa-user-tag"></i>
                        Role
                    </label>
                    <select id="role" name="role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn-auth" id="registerBtn">
                    <i class="fas fa-user-plus"></i>
                    Daftar
                </button>
            </form>

            <div class="auth-footer">
                <p>Sudah punya akun? <a href="index.html">Login disini</a></p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
