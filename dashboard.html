<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistem Absensi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="dashboard-page">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="fas fa-fingerprint"></i>
                <h3>Absensi System</h3>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="siswa">
                <i class="fas fa-users"></i>
                <span>Data Siswa</span>
            </a>
            <a href="#" class="nav-item" data-page="staff">
                <i class="fas fa-chalkboard-user"></i>
                <span>Data Staff</span>
            </a>
            <a href="#" class="nav-item" data-page="attendance">
                <i class="fas fa-calendar-check"></i>
                <span>Rekap Absensi</span>
            </a>
            <a href="#" class="nav-item" data-page="alpha">
                <i class="fas fa-exclamation-triangle"></i>
                <span>Manual Alpha</span>
            </a>
            <a href="#" class="nav-item" data-page="commands">
                <i class="fas fa-terminal"></i>
                <span>ESP32 Command</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <div>
                    <span id="userName">User</span>
                    <small id="userRole">role</small>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-header">
            <h1 id="pageTitle">Dashboard</h1>
            <div class="header-actions">
                <span id="currentDateTime" class="datetime"></span>
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <div id="pageContent" class="page-content">
            <!-- Content will be loaded here -->
        </div>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="spinner"></div>
        <p>Memuat data...</p>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
