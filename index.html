<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload Gambar - Working ✅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        h2 {
            color: #555;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
        }

        .badge-warning {
            background: #f59e0b;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }

        .login-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .user-info {
            background: linear-gradient(135deg, #e8f4f8 0%, #d1ecf1 100%);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .image-preview {
            margin-top: 15px;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .gallery-item-info {
            padding: 12px;
        }

        .gallery-item-info p {
            margin: 5px 0;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }

        .delete-btn {
            background: #dc3545;
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .provider-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
        }

        .provider-supabase {
            background: #3b82f6;
            color: white;
        }

        .provider-imgbb {
            background: #f59e0b;
            color: white;
        }

        .size-warning {
            color: #f59e0b;
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .card {
                padding: 20px;
            }
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Card -->
        <div class="card">
            <h1>
                📸 Test Upload Gambar 
                <span class="badge">✅ WORKING</span>
                <span class="badge badge-warning">Max 4.5MB</span>
            </h1>
            <p>Backend: <strong>https://backend9.vercel.app</strong> | Status: <strong style="color:#10b981;">Online ✅</strong></p>
        </div>

        <!-- Login Section -->
        <div class="card" id="loginCard">
            <h2>🔐 Login / Register</h2>
            <div class="login-section">
                <div class="flex-row" style="margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label>Email:</label>
                        <input type="email" id="loginEmail" placeholder="Email" value="test@example.com">
                    </div>
                    <div style="flex: 1;">
                        <label>Password:</label>
                        <input type="password" id="loginPassword" placeholder="Password" value="123456">
                    </div>
                </div>
                <button onclick="login()" id="loginBtn">🚀 Login / Register</button>
                <div id="loginStatus" class="status"></div>
            </div>
        </div>

        <!-- User Info Card -->
        <div class="card" id="userCard" style="display: none;">
            <div class="user-info" id="userInfo">
                <strong>✅ Login sebagai:</strong> <span id="userName"></span> 
                (<span id="userRole"></span>)<br>
                <strong>📧 Email:</strong> <span id="userEmail"></span><br>
                <strong>🆔 User ID:</strong> <span id="userId"></span>
            </div>
            <button onclick="logout()" class="btn-secondary">🚪 Logout</button>
        </div>

        <!-- Upload Section -->
        <div class="card" id="uploadCard" style="display: none;">
            <h2>📤 Upload Gambar</h2>
            
            <div class="form-group">
                <label>Pilih Gambar (JPG/PNG, max 4.5MB):</label>
                <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg,image/gif" onchange="previewImage(this)">
                <div class="file-info" id="fileInfo"></div>
                <div class="image-preview" id="imagePreview"></div>
            </div>
            
            <div class="form-group">
                <label>Judul Gambar (opsional):</label>
                <input type="text" id="imageTitle" placeholder="Misal: Foto Profile / Dokumentasi">
            </div>
            
            <button onclick="uploadImage()" id="uploadBtn">🚀 Upload Gambar</button>
            
            <div id="uploadStatus" class="status"></div>
        </div>

        <!-- Gallery Section -->
        <div class="card" id="galleryCard" style="display: none;">
            <h2>🖼️ Gallery Gambar</h2>
            <div class="flex-row" style="margin-bottom: 20px; justify-content: space-between;">
                <button onclick="loadImages()" class="btn-secondary" style="width: auto;">🔄 Refresh Gallery</button>
                <span id="photoCount" style="color: #666;"></span>
            </div>
            <div id="galleryContainer">
                <div class="loading">📥 Loading gambar...</div>
            </div>
        </div>
    </div>

    <script>
        let authToken = null;
        let currentUser = null;
        const API_BASE = 'https://backend9.vercel.app';

        // ============ AUTHENTICATION ============
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                showStatus('loginStatus', 'Email dan password wajib diisi', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ Loading...';

            try {
                let response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                let data = await response.json();

                if (!response.ok && data.message === 'Email atau password salah') {
                    showStatus('loginStatus', 'Mencoba registrasi...', 'info');
                    
                    const registerResponse = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            nama: email.split('@')[0],
                            role: 'siswa'
                        })
                    });
                    
                    const registerData = await registerResponse.json();
                    
                    if (registerResponse.ok) {
                        data = registerData;
                        response = registerResponse;
                    } else {
                        throw new Error(registerData.message || 'Registrasi gagal');
                    }
                }

                if (response.ok && data.status === 'success') {
                    authToken = data.data.token;
                    currentUser = data.data.user;
                    
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    document.getElementById('loginCard').style.display = 'none';
                    document.getElementById('userCard').style.display = 'block';
                    document.getElementById('uploadCard').style.display = 'block';
                    document.getElementById('galleryCard').style.display = 'block';
                    
                    document.getElementById('userName').textContent = currentUser.nama;
                    document.getElementById('userRole').textContent = currentUser.role;
                    document.getElementById('userEmail').textContent = currentUser.email;
                    document.getElementById('userId').textContent = currentUser.id;
                    
                    showStatus('loginStatus', `✅ Login berhasil! Selamat datang ${currentUser.nama}`, 'success');
                    
                    loadImages();
                } else {
                    throw new Error(data.message || 'Login gagal');
                }
            } catch (error) {
                showStatus('loginStatus', `❌ Error: ${error.message}`, 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '🚀 Login / Register';
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
            
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('userCard').style.display = 'none';
            document.getElementById('uploadCard').style.display = 'none';
            document.getElementById('galleryCard').style.display = 'none';
            
            document.getElementById('fileInput').value = '';
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('imageTitle').value = '';
            
            showStatus('loginStatus', 'Logout berhasil', 'success');
        }

        // ============ PREVIEW IMAGE ============
        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const fileInfo = document.getElementById('fileInfo');
            preview.innerHTML = '';
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const fileSizeMB = (file.size / 1024 / 1024).toFixed(2);
                const fileSizeKB = (file.size / 1024).toFixed(2);
                const fileType = file.type;
                
                let sizeText = file.size > 1024 * 1024 ? `${fileSizeMB} MB` : `${fileSizeKB} KB`;
                fileInfo.innerHTML = `📄 ${file.name} | ${sizeText} | ${fileType}`;
                
                // Validasi ukuran (max 4.5MB)
                if (file.size > 4.5 * 1024 * 1024) {
                    fileInfo.style.color = 'red';
                    fileInfo.innerHTML += ` ⚠️ File terlalu besar! Maksimal 4.5MB`;
                    document.getElementById('uploadBtn').disabled = true;
                    return;
                } else {
                    fileInfo.style.color = '#666';
                    document.getElementById('uploadBtn').disabled = false;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.maxWidth = '100%';
                    img.style.maxHeight = '250px';
                    img.style.borderRadius = '10px';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                fileInfo.innerHTML = '';
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        // ============ UPLOAD IMAGE (FIXED) ============
        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            const title = document.getElementById('imageTitle').value;
            const file = fileInput.files[0];
            
            if (!file) {
                showStatus('uploadStatus', 'Pilih file gambar terlebih dahulu!', 'error');
                return;
            }
            
            if (file.size > 4.5 * 1024 * 1024) {
                showStatus('uploadStatus', `File terlalu besar (${(file.size / 1024 / 1024).toFixed(2)}MB). Maksimal 4.5MB`, 'error');
                return;
            }
            
            if (!file.type.startsWith('image/')) {
                showStatus('uploadStatus', 'Hanya file gambar yang diperbolehkan', 'error');
                return;
            }
            
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.textContent = '⏳ Mengkonversi ke Base64...';
            
            const reader = new FileReader();
            
            reader.onloadend = async function() {
                let base64String = reader.result;
                
                // HAPUS prefix "data:image/xxx;base64," jika ada
                if (base64String.includes(',')) {
                    base64String = base64String.split(',')[1];
                }
                
                console.log('Base64 length:', base64String.length);
                uploadBtn.textContent = '📤 Upload ke Server...';
                
                try {
                    const response = await fetch(`${API_BASE}/api/photos/upload`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${authToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            image: base64String,  // Kirim base64 MURNI tanpa prefix!
                            title: title || `Upload_${Date.now()}`
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.status === 'success') {
                        const provider = data.data?.provider || 'storage';
                        showStatus('uploadStatus', `✅ Upload berhasil ke ${provider.toUpperCase()}!`, 'success');
                        
                        document.getElementById('fileInput').value = '';
                        document.getElementById('imagePreview').innerHTML = '';
                        document.getElementById('imageTitle').value = '';
                        document.getElementById('fileInfo').innerHTML = '';
                        
                        loadImages();
                    } else {
                        throw new Error(data.message || data.error || 'Upload gagal');
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    showStatus('uploadStatus', `❌ Error: ${error.message}`, 'error');
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = '🚀 Upload Gambar';
                }
            };
            
            reader.onerror = function() {
                showStatus('uploadStatus', '❌ Gagal membaca file', 'error');
                uploadBtn.disabled = false;
                uploadBtn.textContent = '🚀 Upload Gambar';
            };
            
            reader.readAsDataURL(file);
        }

        // ============ LOAD IMAGES ============
        async function loadImages() {
            const galleryContainer = document.getElementById('galleryContainer');
            const photoCount = document.getElementById('photoCount');
            galleryContainer.innerHTML = '<div class="loading">📥 Memuat gambar...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/photos?limit=50`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    photoCount.textContent = `📷 Total: ${data.total} foto`;
                    
                    if (data.data && data.data.length > 0) {
                        displayGallery(data.data);
                    } else {
                        galleryContainer.innerHTML = '<div class="loading">📭 Belum ada gambar. Upload gambar dulu yuk!</div>';
                    }
                } else {
                    throw new Error(data.message || 'Gagal memuat gambar');
                }
            } catch (error) {
                galleryContainer.innerHTML = `<div class="loading" style="color: red;">❌ Error: ${error.message}</div>`;
            }
        }
        
        function displayGallery(photos) {
            const galleryContainer = document.getElementById('galleryContainer');
            galleryContainer.innerHTML = '';
            
            const gallery = document.createElement('div');
            gallery.className = 'gallery';
            
            photos.forEach(photo => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                
                const createdAt = photo.createdAt ? new Date(photo.createdAt).toLocaleString('id-ID') : 'Tanggal tidak tersedia';
                const providerClass = photo.provider === 'supabase' ? 'provider-supabase' : 'provider-imgbb';
                const providerName = photo.provider === 'supabase' ? 'Supabase' : 'ImgBB';
                
                item.innerHTML = `
                    <img src="${photo.url}" alt="${photo.title || 'Gambar'}" onerror="this.src='https://placehold.co/300x200?text=Gambar+Gagal+Load'">
                    <div class="gallery-item-info">
                        <p><strong>📝 Judul:</strong> ${escapeHtml(photo.title || 'Tanpa judul')}</p>
                        <p><span class="provider-badge ${providerClass}">${providerName}</span></p>
                        <p><strong>📅 Upload:</strong> ${createdAt}</p>
                        <p><strong>🆔 ID:</strong> ${photo.id.substring(0, 8)}...</p>
                        <button class="delete-btn" onclick="deleteImage('${photo.id}')">🗑️ Hapus</button>
                    </div>
                `;
                
                gallery.appendChild(item);
            });
            
            galleryContainer.appendChild(gallery);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============ DELETE IMAGE ============
        async function deleteImage(photoId) {
            if (!confirm('Apakah Anda yakin ingin menghapus gambar ini?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/photos/${photoId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    showStatus('uploadStatus', '✅ Gambar berhasil dihapus!', 'success');
                    loadImages();
                } else {
                    throw new Error(data.message || 'Gagal menghapus gambar');
                }
            } catch (error) {
                showStatus('uploadStatus', `❌ Error: ${error.message}`, 'error');
            }
        }
        
        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `status ${type}`;
            
            setTimeout(() => {
                element.className = 'status';
                element.style.display = 'none';
                setTimeout(() => {
                    element.style.display = '';
                }, 300);
            }, 5000);
        }
        
        // ============ CHECK SAVED LOGIN ============
        function checkSavedLogin() {
            const savedToken = localStorage.getItem('authToken');
            const savedUser = localStorage.getItem('currentUser');
            
            if (savedToken && savedUser) {
                authToken = savedToken;
                currentUser = JSON.parse(savedUser);
                
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('userCard').style.display = 'block';
                document.getElementById('uploadCard').style.display = 'block';
                document.getElementById('galleryCard').style.display = 'block';
                
                document.getElementById('userName').textContent = currentUser.nama;
                document.getElementById('userRole').textContent = currentUser.role;
                document.getElementById('userEmail').textContent = currentUser.email;
                document.getElementById('userId').textContent = currentUser.id;
                
                loadImages();
            }
        }
        
        // Initialize
        checkSavedLogin();
    </script>
</body>
</html>
