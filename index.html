<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Absensi & Data Siswa</title>
<style>
  :root {
    --bg-color: #121212;
    --card-bg: #1e1e1e;
    --text-color: #e0e0e0;
    --primary: #00bcd4;
    --primary-hover: #008ba3;
    --secondary: #ff9800;
    --secondary-hover: #e65100;
    --danger: #f44336;
    --success: #4caf50;
    --border: #333;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* --- LOGIN STYLES --- */
  #login-section {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: var(--bg-color);
    z-index: 1000;
  }

  .login-card {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    width: 300px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .login-card h2 {
    margin-top: 0;
    color: var(--primary);
  }

  .form-group {
    margin-bottom: 15px;
    text-align: left;
  }

  .form-group label {
    display: block;
    margin-bottom: 5px;
    font-size: 0.9rem;
  }

  .form-group input {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
    background: #2c2c2c;
    border: 1px solid var(--border);
    color: #fff;
    border-radius: 5px;
  }

  .btn-login {
    width: 100%;
    padding: 10px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
  }

  .btn-login:hover {
    background: var(--primary-hover);
  }

  /* --- DASHBOARD LAYOUT --- */
  #dashboard-section {
    display: none; /* Hidden by default */
    padding: 20px;
    flex: 1;
    overflow-y: auto;
  }

  .header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card-bg);
    padding: 15px 20px;
    border-radius: 8px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }

  .clock-display {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--primary);
    font-family: 'Courier New', monospace;
  }

  /* --- TABS NAVIGATION --- */
  .nav-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .tab-btn {
    padding: 10px 20px;
    background: #2c2c2c;
    color: #aaa;
    border: 1px solid var(--border);
    border-radius: 5px 5px 0 0;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
  }

  .tab-btn.active {
    background: var(--card-bg);
    color: var(--primary);
    border-bottom: 2px solid var(--primary);
  }
  
  .tab-btn:hover:not(.active) {
    background: #333;
    color: #fff;
  }

  .tab-content {
    display: none;
    animation: fadeIn 0.3s ease-in-out;
  }
  
  .tab-content.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- CONTROLS --- */
  .controls-bar {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--card-bg);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  select, input[type="text"], input[type="time"] {
    padding: 8px;
    background: #2c2c2c;
    color: #fff;
    border: 1px solid var(--border);
    border-radius: 5px;
    min-width: 150px;
  }

  .btn-primary {
    padding: 8px 15px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-primary:hover { background: var(--primary-hover); }

  .btn-download {
    padding: 8px 15px;
    background: var(--success);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-left: auto;
  }
  .btn-download:hover { background: #388e3c; }

  .btn-logout {
    background: var(--danger);
    color: white;
    border: none;
    padding: 5px 15px;
    border-radius: 5px;
    cursor: pointer;
  }

  /* --- TABLE STYLES --- */
  .table-container {
    overflow-x: auto;
    background: var(--card-bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
  }

  th, td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  th {
    background: #252525;
    color: var(--primary);
    font-weight: 600;
    position: sticky;
    top: 0;
  }

  tr:hover {
    background: #2a2a2a;
  }

  .status {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: bold;
  }
  .hadir { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
  .pulang { background: rgba(244, 67, 54, 0.2); color: #f44336; }
  .pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }

  .action-btns {
    display: flex;
    gap: 5px;
  }

  .btn-edit {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .btn-edit:hover {
    border-color: var(--primary);
    color: var(--primary);
  }
  
  .btn-delete {
    background: none;
    border: 1px solid #555;
    color: #aaa;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .btn-delete:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* --- MODAL --- */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    justify-content: center;
    align-items: center;
  }

  .modal-box {
    background: var(--card-bg);
    padding: 25px;
    border-radius: 8px;
    width: 350px;
    border: 1px solid var(--primary);
    box-shadow: 0 0 20px rgba(0, 188, 212, 0.2);
  }

  .modal-title {
    margin-top: 0;
    color: var(--primary);
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-save {
    background: var(--primary);
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
  }
  .btn-cancel {
    background: #555;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
  }

  /* --- TOAST --- */
  .toast {
    visibility: hidden;
    min-width: 250px;
    background-color: #333;
    color: #fff;
    text-align: center;
    border-radius: 4px;
    padding: 16px;
    position: fixed;
    z-index: 3000;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    border-left: 5px solid var(--primary);
  }
  .toast.show {
    visibility: visible;
    animation: fadein 0.5s, fadeout 0.5s 2.5s;
  }
  @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
  @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

</style>
</head>
<body>

  <!-- LOGIN SECTION -->
  <div id="login-section">
    <div class="login-card">
      <h2>🔐 Login Admin</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="1234" required>
        </div>
        <button type="submit" class="btn-login">MASUK</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboard-section">
    <!-- Header: Clock & Logout -->
    <div class="header-bar">
      <div>
        <h2 style="margin:0; color: var(--primary);">📊 Admin Panel</h2>
      </div>
      <div style="display: flex; align-items: center; gap: 20px;">
        <div id="clock" class="clock-display">--:--:--</div>
        <button class="btn-logout" onclick="logout()">Keluar</button>
      </div>
    </div>

    <!-- TABS -->
    <div class="nav-tabs">
      <button class="tab-btn active" onclick="switchTab('attendance')">Data Absensi</button>
      <button class="tab-btn" onclick="switchTab('students')">Daftar Siswa</button>
    </div>

    <!-- TAB 1: ATTENDANCE DATA -->
    <div id="tab-attendance" class="tab-content active">
      <!-- Controls: Filters & Download -->
      <div class="controls-bar">
        <div class="filter-group">
          <label>Kelas:</label>
          <select id="filterKelas" onchange="renderTable()">
            <option value="all">Semua Kelas</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Jurusan:</label>
          <select id="filterJurusan" onchange="renderTable()">
            <option value="all">Semua Jurusan</option>
          </select>
        </div>
        
        <button class="btn-download" onclick="downloadExcel()">
          <span>📥 Download Excel</span>
        </button>
      </div>

      <!-- Data Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>ID</th>
              <th>Nama</th>
              <th>Kelas</th>
              <th>Jurusan</th>
              <th>Check In</th>
              <th>Check Out</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbody-attendance">
            <tr><td colspan="9" style="text-align:center;">🔄 Mengambil data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- TAB 2: STUDENTS DATA (NEW FEATURE) -->
    <div id="tab-students" class="tab-content">
      <!-- Add Student Form -->
      <div class="controls-bar">
        <div class="filter-group">
          <input type="text" id="newNama" placeholder="Nama Siswa" style="width: 200px;">
        </div>
        <div class="filter-group">
          <select id="newKelas" style="min-width: 100px;">
            <option value="" disabled selected>Pilih Kelas</option>
            <option value="X">Kelas X</option>
            <option value="XI">Kelas XI</option>
            <option value="XII">Kelas XII</option>
          </select>
        </div>
        <div class="filter-group">
          <select id="newJurusan" style="min-width: 100px;">
            <option value="" disabled selected>Pilih Jurusan</option>
            <option value="RPL">RPL</option>
            <option value="TKJ">TKJ</option>
            <option value="MM">Multimedia</option>
          </select>
        </div>
        <button class="btn-primary" onclick="addStudent()">
          <span>➕ Tambah Siswa</span>
        </button>
      </div>

      <!-- Students Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID Firebase</th>
              <th>Nama Lengkap</th>
              <th>Kelas</th>
              <th>Jurusan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbody-students">
            <tr><td colspan="5" style="text-align:center;">🔄 Mengambil data siswa...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- MODAL EDIT CHECKOUT -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-box">
      <h3 class="modal-title">Edit Waktu Pulang</h3>
      <p id="editInfo" style="color:#aaa; margin-bottom: 15px;"></p>
      <input type="hidden" id="editDateKey">
      <input type="hidden" id="editUserId">
      
      <div class="form-group">
        <label>Waktu Check Out Baru</label>
        <input type="time" id="editCheckoutTime">
      </div>
      
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Batal</button>
        <button class="btn-save" onclick="saveEdit()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast">Pesan notifikasi</div>

  <!-- FIREBASE & LOGIC SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyBZg9NpbBAg8dKHkCbYf4J_2bpHH2ZJWWI",
      authDomain: "absensi-4389a.firebaseapp.com",
      databaseURL: "https://absensi-4389a-default-rtdb.firebaseio.com",
      projectId: "absensi-4389a",
      storageBucket: "absensi-4389a.appspot.com",
      messagingSenderId: "262927639457",
      appId: "1:262927639457:web:da08d4d809bf46c71ee1e0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // Referensi Database
    const attendanceRef = ref(db, "attendance");
    const studentsRef = ref(db, "students"); // Referensi ke Data Siswa sesuai request

    // --- GLOBAL STATE ---
    let allData = []; 
    let filteredData = []; 
    let allStudents = []; // Menyimpan data siswa

    // --- LOGIN LOGIC ---
    const loginForm = document.getElementById('loginForm');
    const loginSection = document.getElementById('login-section');
    const dashboardSection = document.getElementById('dashboard-section');

    if(loginForm) {
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if (u === 'admin' && p === '1234') {
          showToast("✅ Login Berhasil");
          loginSection.style.display = 'none';
          dashboardSection.style.display = 'block';
          startClock();
          initFirebase(); 
        } else {
          showToast("❌ Username atau Password salah!");
        }
      });
    }

    window.logout = function() {
      location.reload();
    }

    // --- TABS LOGIC ---
    window.switchTab = function(tabName) {
      // Hide all contents
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      // Deactivate all buttons
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      // Activate target
      document.getElementById(`tab-${tabName}`).classList.add('active');
      
      // Find button that called this (simple approach)
      const buttons = document.querySelectorAll('.tab-btn');
      if(tabName === 'attendance') buttons[0].classList.add('active');
      if(tabName === 'students') buttons[1].classList.add('active');
    }

    // --- CLOCK FUNCTION ---
    function startClock() {
      const clockEl = document.getElementById('clock');
      setInterval(() => {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = now.toLocaleDateString('id-ID', options);
        const timeStr = now.toLocaleTimeString('id-ID', { hour12: false });
        clockEl.textContent = `${dateStr} | ${timeStr}`;
      }, 1000);
    }

    // --- FIREBASE DATA HANDLING ---
    function initFirebase() {
      // 1. Listener Attendance (Data Absensi)
      onValue(attendanceRef, (snapshot) => {
        const rawData = snapshot.val();
        const tbody = document.getElementById('tbody-attendance');

        if (!rawData) {
          tbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>❌ Tidak ada data absensi</td></tr>";
          allData = [];
          return;
        }

        let tempData = [];
        const keys = Object.keys(rawData);
        if(keys.length === 0) {
            tbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>❌ Tidak ada data</td></tr>";
            return;
        }

        const firstKey = keys[0];
        const isDateFormat = firstKey.includes("-"); 

        if (isDateFormat) {
          Object.keys(rawData).sort().reverse().forEach(date => {
            const users = rawData[date];
            if (users) {
              Object.keys(users).forEach(id => {
                const u = users[id] || {};
                tempData.push({
                  date: date,
                  id: id,
                  nama: u.nama || "-",
                  kelas: u.kelas || "-",
                  jurusan: u.jurusan || "-",
                  check_in: u.check_in_time || "-",
                  check_out: u.check_out_time || "-",
                  status: (u.status || "-").toLowerCase(),
                  _pathDate: date,
                  _pathId: id
                });
              });
            }
          });
        } else {
          Object.keys(rawData).forEach(id => {
            const u = rawData[id] || {};
            tempData.push({
              date: "-",
              id: id,
              nama: u.nama || "-",
              kelas: u.kelas || "-",
              jurusan: u.jurusan || "-",
              check_in: u.check_in_time || "-",
              check_out: u.check_out_time || "-",
              status: (u.status || "-").toLowerCase(),
              _pathDate: '-',
              _pathId: id
            });
          });
        }

        allData = tempData;
        populateFilters();
        renderTable();
      });

      // 2. Listener Students (Data Siswa) - TAMBAHAN BARU
      onValue(studentsRef, (snapshot) => {
        const rawData = snapshot.val();
        const tbody = document.getElementById('tbody-students');

        if (!rawData) {
          tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>⚠️ Belum ada data siswa</td></tr>";
          allStudents = [];
          return;
        }

        let tempStudents = [];
        Object.keys(rawData).forEach(key => {
            const s = rawData[key];
            tempStudents.push({
                key: key, // Firebase unique key
                nama: s.nama || "-",
                kelas: s.kelas || "-",
                jurusan: s.jurusan || "-"
            });
        });

        allStudents = tempStudents;
        renderStudentsTable();
      });
    }

    // --- FILTERING & RENDERING (ATTENDANCE) ---
    function populateFilters() {
      const kelasSet = new Set();
      const jurusanSet = new Set();

      allData.forEach(item => {
        if(item.kelas && item.kelas !== '-') kelasSet.add(item.kelas);
        if(item.jurusan && item.jurusan !== '-') jurusanSet.add(item.jurusan);
      });

      const kelasSelect = document.getElementById('filterKelas');
      const jurusanSelect = document.getElementById('filterJurusan');

      const savedKelas = kelasSelect.value;
      const savedJurusan = jurusanSelect.value;

      kelasSelect.innerHTML = '<option value="all">Semua Kelas</option>';
      jurusanSelect.innerHTML = '<option value="all">Semua Jurusan</option>';

      Array.from(kelasSet).sort().forEach(k => {
        kelasSelect.innerHTML += `<option value="${k}">${k}</option>`;
      });
      Array.from(jurusanSet).sort().forEach(j => {
        jurusanSelect.innerHTML += `<option value="${j}">${j}</option>`;
      });

      if(savedKelas !== 'all' && Array.from(kelasSet).includes(savedKelas)) kelasSelect.value = savedKelas;
      if(savedJurusan !== 'all' && Array.from(jurusanSet).includes(savedJurusan)) jurusanSelect.value = savedJurusan;
    }

    window.renderTable = function() {
      const kelasVal = document.getElementById('filterKelas').value;
      const jurusanVal = document.getElementById('filterJurusan').value;
      const tbody = document.getElementById('tbody-attendance');

      filteredData = allData.filter(item => {
        const matchKelas = kelasVal === 'all' || item.kelas === kelasVal;
        const matchJurusan = jurusanVal === 'all' || item.jurusan === jurusanVal;
        return matchKelas && matchJurusan;
      });

      if (filteredData.length === 0) {
        tbody.innerHTML = "<tr><td colspan='9' style='text-align:center; padding: 20px;'>Data tidak ditemukan.</td></tr>";
        return;
      }

      let rows = "";
      filteredData.forEach(item => {
        const statusClass = item.status === 'hadir' ? 'hadir' : (item.status === 'pulang' ? 'pulang' : 'pending');
        
        rows += `
          <tr>
            <td>${item.date}</td>
            <td>${item.id}</td>
            <td>${item.nama}</td>
            <td>${item.kelas}</td>
            <td>${item.jurusan}</td>
            <td>${item.check_in}</td>
            <td>
                ${item.check_out}
                <button class="btn-edit" onclick="openEdit('${item._pathDate}', '${item._pathId}', '${item.check_out}', '${item.nama}')" title="Edit Waktu Pulang">✏️</button>
            </td>
            <td><span class="status ${statusClass}">${item.status}</span></td>
            <td>-</td>
          </tr>
        `;
      });

      tbody.innerHTML = rows;
    }

    // --- RENDERING STUDENTS (NEW LOGIC) ---
    function renderStudentsTable() {
        const tbody = document.getElementById('tbody-students');
        if(allStudents.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Belum ada data siswa.</td></tr>";
            return;
        }

        let rows = "";
        allStudents.forEach(s => {
            rows += `
                <tr>
                    <td style="font-family:monospace; color:#888;">${s.key}</td>
                    <td>${s.nama}</td>
                    <td>${s.kelas}</td>
                    <td>${s.jurusan}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteStudent('${s.key}', '${s.nama}')">🗑️ Hapus</button>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = rows;
    }

    // --- ADD STUDENT (NEW LOGIC) ---
    window.addStudent = function() {
        const nama = document.getElementById('newNama').value.trim();
        const kelas = document.getElementById('newKelas').value;
        const jurusan = document.getElementById('newJurusan').value;

        if(!nama || !kelas || !jurusan) {
            showToast("⚠️ Lengkapi semua data siswa!");
            return;
        }

        // Push ke Firebase /students
        const newStudentRef = push(studentsRef);
        set(newStudentRef, {
            nama: nama,
            kelas: kelas,
            jurusan: jurusan,
            created_at: new Date().toISOString()
        }).then(() => {
            showToast("✅ Siswa berhasil ditambahkan");
            // Reset form
            document.getElementById('newNama').value = "";
            document.getElementById('newKelas').selectedIndex = 0;
            document.getElementById('newJurusan').selectedIndex = 0;
        }).catch(err => {
            console.error(err);
            showToast("❌ Gagal menambah siswa");
        });
    }

    // Perlu import 'set' jika belum ada (tapi 'update' sudah ada, biasanya 'set' juga diimport dari firebase-database)
    // Untuk amannya, tambahkan import di atas jika perlu. 
    // Di script import line, saya tambahkan 'set' jika belum, tapi kode user pakai 'update'. 
    // Saya akan gunakan 'update' di push path atau tambah import 'set'.
    
    import { set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"; 
    // Correction: 'set' isn't default exported like that in v10 sometimes, let's use update on the push ref key
    // Actually push returns ref, we can use update on that ref.
    // Revised Add Logic using update:
    window.addStudent = function() {
        const nama = document.getElementById('newNama').value.trim();
        const kelas = document.getElementById('newKelas').value;
        const jurusan = document.getElementById('newJurusan').value;

        if(!nama || !kelas || !jurusan) {
            showToast("⚠️ Lengkapi semua data siswa!");
            return;
        }

        const newData = {
            nama: nama,
            kelas: kelas,
            jurusan: jurusan
        };

        push(studentsRef, newData)
        .then(() => {
            showToast("✅ Siswa berhasil ditambahkan");
            document.getElementById('newNama').value = "";
            document.getElementById('newKelas').selectedIndex = 0;
            document.getElementById('newJurusan').selectedIndex = 0;
        })
        .catch((err) => {
            showToast("❌ Gagal: " + err.message);
        });
    }

    // --- DELETE STUDENT (NEW LOGIC) ---
    window.deleteStudent = function(key, nama) {
        if(confirm(`Yakin ingin menghapus siswa: ${nama}?`)) {
            const studentRef = ref(db, `students/${key}`);
            remove(studentRef)
            .then(() => {
                showToast("🗑️ Siswa berhasil dihapus");
            })
            .catch(err => {
                showToast("❌ Gagal menghapus");
            });
        }
    }

    // --- EDIT FUNCTIONALITY (ATTENDANCE) ---
    const modal = document.getElementById('editModal');
    const editTimeInput = document.getElementById('editCheckoutTime');
    const editDateKey = document.getElementById('editDateKey');
    const editUserId = document.getElementById('editUserId');
    const editInfo = document.getElementById('editInfo');

    window.openEdit = function(dateKey, userId, currentCheckout, nama) {
      editDateKey.value = dateKey;
      editUserId.value = userId;
      editInfo.textContent = `Edit untuk: ${nama} (${dateKey})`;
      
      if(currentCheckout && currentCheckout.includes(':')) {
        editTimeInput.value = currentCheckout.substring(0, 5);
      } else {
        editTimeInput.value = "";
      }

      modal.style.display = 'flex';
    }

    window.closeModal = function() {
      modal.style.display = 'none';
    }

    window.saveEdit = function() {
      const newTime = editTimeInput.value; 
      const dKey = editDateKey.value;
      const uId = editUserId.value;

      if(!newTime) {
        showToast("⚠️ Masukkan waktu yang valid");
        return;
      }

      let updatePath = {};
      const fullTime = newTime + ":00";

      if(dKey === '-') {
        updatePath[`attendance/${uId}/check_out_time`] = fullTime;
        updatePath[`attendance/${uId}/status`] = "Pulang";
      } else {
        updatePath[`attendance/${dKey}/${uId}/check_out_time`] = fullTime;
        updatePath[`attendance/${dKey}/${uId}/status`] = "Pulang";
      }

      update(ref(db), updatePath)
        .then(() => {
          showToast("✅ Waktu pulang berhasil diupdate");
          closeModal();
        })
        .catch((err) => {
          console.error(err);
          showToast("❌ Gagal mengupdate data");
        });
    }

    // --- DOWNLOAD EXCEL (CSV) ---
    window.downloadExcel = function() {
      if(filteredData.length === 0) {
        showToast("⚠️ Tidak ada data untuk didownload");
        return;
      }

      let csvContent = "Tanggal,ID,Nama,Kelas,Jurusan,Check In,Check Out,Status\n";

      filteredData.forEach(row => {
        const clean = (text) => `"${String(text).replace(/"/g, '""')}"`;
        
        const rowStr = [
          clean(row.date),
          clean(row.id),
          clean(row.nama),
          clean(row.kelas),
          clean(row.jurusan),
          clean(row.check_in),
          clean(row.check_out),
          clean(row.status)
        ].join(",");
        
        csvContent += rowStr + "\n";
      });

      const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      const dateStr = new Date().toISOString().slice(0,10);
      link.setAttribute("download", `Data_Absensi_${dateStr}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast("📥 Data sedang didownload...");
    }

    function showToast(message) {
      const x = document.getElementById("toast");
      x.textContent = message;
      x.className = "toast show";
      setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }

  </script>
</body>
</html>
